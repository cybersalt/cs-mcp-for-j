PLG_SYSTEM_CSMCPFORJ4SEO="System - MCP for Joomla: 4SEO add-on"
PLG_SYSTEM_CSMCPFORJ4SEO_XML_DESCRIPTION="Adds MCP tools that introspect and modify the Weeblr 4SEO extension (com_forseo). 4SEO has no public Web Services API, so these tools work directly against the #__forseo_* tables. Strictly limited to forseo_* tables — refuses to touch anything else."
