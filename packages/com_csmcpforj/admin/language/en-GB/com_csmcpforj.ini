; Sidebar — quick start
COM_CSMCPFORJ_DASHBOARD_QUICKSTART_HEADING="Quick start"
COM_CSMCPFORJ_DASHBOARD_QUICKSTART_STEP1_TITLE="1. Generate an API token"
COM_CSMCPFORJ_DASHBOARD_QUICKSTART_STEP1_BODY="Sign in as the user you want the MCP client to act as. Open My Profile, switch to the Joomla API Token tab, click the eye icon to reveal."
COM_CSMCPFORJ_DASHBOARD_QUICKSTART_STEP2_TITLE="2. Confirm permissions"
COM_CSMCPFORJ_DASHBOARD_QUICKSTART_STEP2_BODY="Super Users, Administrator and Manager work immediately. For any other group, grant Use / Write in System &rarr; Permissions on this component."
COM_CSMCPFORJ_DASHBOARD_QUICKSTART_STEP3_TITLE="3. Paste into the client"
COM_CSMCPFORJ_DASHBOARD_QUICKSTART_STEP3_BODY="Copy the configuration snippet, paste into your MCP client, restart the client. Try tools/list to confirm the connection."

