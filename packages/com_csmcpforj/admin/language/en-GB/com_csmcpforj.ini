; Permissions card
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_HEADING="Who can use this endpoint?"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_INTRO="Permissions are checked against the Joomla user account that owns the API token. The MCP client (Claude Desktop, Claude Code, claude.ai, curl, anything else) is just a relay &mdash; the same token from any client behaves identically."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_KEY_FACT_LABEL="Important:"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_KEY_FACT_BODY="Whoever generates the token gets the same access through the MCP endpoint that they have anywhere else in the Joomla admin. Only generate tokens for users you would trust to do those actions directly."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_COL_GROUP="Joomla user group"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_COL_OUTOFBOX="Works out of the box?"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_COL_REASON="Why"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_YES="Yes"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_NEEDS_GRANT="Needs explicit grant"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_SUPER="Super Users always pass every permission check in Joomla."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_ADMIN="Has core.admin on the component, which the MCP gate accepts as a fallback."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_MANAGER="Has core.manage, which the MCP gate accepts as a fallback for read and write tools."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_GROUP_OTHER="Author / Registered / custom group"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_OTHER="Grant Use MCP endpoint and (optionally) Write through MCP endpoint in System &rarr; Permissions."

; Setup methods card — tabs: prompt (recommended) and MCP connector (manual)
COM_CSMCPFORJ_DASHBOARD_METHODS_HEADING="Connect Claude to this site"
COM_CSMCPFORJ_DASHBOARD_METHODS_INTRO="Two ways to do it. The first one (copy-paste prompt) is the easiest &mdash; works without any client configuration, and after Claude confirms it works it will offer to install this site as a permanent connector for you with no manual JSON editing. The second is for users who prefer to edit their client config directly."

; Tab 1 — copy-paste prompt (default)
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_TAB="Copy a prompt into Claude (recommended)"
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_HEADING="Paste a prompt into Claude"
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_INTRO="No client configuration needed. Copy the prompt below into a fresh Claude conversation. Claude will run a test curl, confirm the connection, and offer to make the connection permanent for you &mdash; no JSON files to edit, no terminal commands to remember."
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_BONUS_LABEL="Bonus:"
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_BONUS_BODY="If you're using Claude Code (in VS Code or terminal), the prompt itself includes a self-install offer. Just say &lsquo;make it permanent&rsquo; after Claude confirms the connection works, and Claude will run <code>claude mcp add</code> for you (you'll see an approval dialog before anything runs). After a Claude restart, this site appears as native MCP tools in every conversation &mdash; no prompt needed ever again."
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_STEP1="Generate a Joomla API token in My Profile (link on the right)."
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_STEP2="Click &lsquo;Copy prompt&rsquo; below."
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_STEP3="Paste it into a new Claude conversation, then replace <code>&lt;PASTE YOUR JOOMLA API TOKEN HERE&gt;</code> with your actual token."
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_STEP4="Send. Claude will test the connection and (in Claude Code) offer to make it permanent."
COM_CSMCPFORJ_DASHBOARD_METHOD_PROMPT_HINT="This prompt works in <strong>Claude Code</strong> (best), Claude Desktop with shell access, and any other Claude client that can run curl. It will not work directly in claude.ai's web UI &mdash; for that, use the MCP Connector tab."

; Tab 2 — manual MCP connector configuration
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_TAB="MCP Connector (manual config)"
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_HEADING="Add as an MCP connector manually"
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_INTRO="For Claude Desktop, claude.ai, or any client where you'd rather edit the configuration directly. One-time setup, persistent across all conversations."
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_STEP1="Generate a Joomla API token in My Profile."
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_STEP2="Copy the configuration snippet below."
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_STEP3="Replace <code>YOUR_JOOMLA_API_TOKEN</code> with the token you generated."
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_STEP4="Paste it into your Claude client's MCP config (Claude Desktop: <code>claude_desktop_config.json</code>; claude.ai: Settings &rarr; Connectors &rarr; Add custom connector; Claude Code: <code>claude mcp add</code>) and restart the client."
COM_CSMCPFORJ_DASHBOARD_METHOD_CONNECTOR_XHEADER_NOTE="If your client doesn't support an Authorization header, swap the headers block for:"

COM_CSMCPFORJ_DASHBOARD_COPY_BUTTON="Copy configuration"
