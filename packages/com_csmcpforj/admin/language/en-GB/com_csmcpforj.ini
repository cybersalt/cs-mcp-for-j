; Permissions card
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_HEADING="Who can use this endpoint?"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_INTRO="Permissions are checked against the Joomla user account that owns the API token. The MCP client (Claude Desktop, Claude Code, claude.ai, curl, anything else) is just a relay &mdash; the same token from any client behaves identically."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_KEY_FACT_LABEL="Important:"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_KEY_FACT_BODY="Whoever generates the token gets the same access through the MCP endpoint that they have anywhere else in the Joomla admin. Only generate tokens for users you would trust to do those actions directly."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_COL_GROUP="Joomla user group"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_COL_OUTOFBOX="Works out of the box?"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_COL_REASON="Why"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_YES="Yes"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_NEEDS_GRANT="Needs explicit grant"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_SUPER="Super Users always pass every permission check in Joomla."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_ADMIN="Has core.admin on the component, which the MCP gate accepts as a fallback."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_MANAGER="Has core.manage, which the MCP gate accepts as a fallback for read and write tools."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_GROUP_OTHER="Author / Registered / custom group"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_REASON_OTHER="Grant Use MCP endpoint and (optionally) Write through MCP endpoint in System &rarr; Permissions."

; Setup methods card (Method 1 = MCP connector, Method 2 = copy-paste prompt)
COM_CSMCPFORJ_DASHBOARD_METHODS_HEADING="Connect Claude to this site"
COM_CSMCPFORJ_DASHBOARD_METHODS_INTRO="Pick whichever fits how you use Claude. Method 1 is best if you'll work with this site repeatedly &mdash; one-time setup, persistent. Method 2 is best for a one-off task or when you can't change client config &mdash; just paste a prompt into a fresh Claude conversation."

COM_CSMCPFORJ_DASHBOARD_METHOD1_TAB="Method 1 &mdash; MCP Connector"
COM_CSMCPFORJ_DASHBOARD_METHOD1_HEADING="Add as an MCP connector"
COM_CSMCPFORJ_DASHBOARD_METHOD1_INTRO="Configure once, then this site is available in every Claude conversation. Works in Claude Desktop, Claude Code, and claude.ai."
COM_CSMCPFORJ_DASHBOARD_METHOD1_STEP1="Generate a Joomla API token in My Profile (link on the right)."
COM_CSMCPFORJ_DASHBOARD_METHOD1_STEP2="Copy the configuration snippet below."
COM_CSMCPFORJ_DASHBOARD_METHOD1_STEP3="Replace <code>YOUR_JOOMLA_API_TOKEN</code> with the token you generated."
COM_CSMCPFORJ_DASHBOARD_METHOD1_STEP4="Paste it into your Claude client's MCP config (Claude Desktop: <code>claude_desktop_config.json</code>; claude.ai: Settings &rarr; Connectors &rarr; Add custom connector; Claude Code: <code>claude mcp add</code>) and restart the client."
COM_CSMCPFORJ_DASHBOARD_METHOD1_XHEADER_NOTE="If your client doesn't support an Authorization header, swap the headers block for:"

COM_CSMCPFORJ_DASHBOARD_METHOD2_TAB="Method 2 &mdash; Copy-paste prompt"
COM_CSMCPFORJ_DASHBOARD_METHOD2_HEADING="Paste a prompt into Claude"
COM_CSMCPFORJ_DASHBOARD_METHOD2_INTRO="No MCP setup needed. Copy the prompt below, paste it into a fresh Claude conversation, and Claude will talk to this site directly via curl. Best in Claude Code (which has bash/curl built in)."
COM_CSMCPFORJ_DASHBOARD_METHOD2_STEP1="Generate a Joomla API token in My Profile."
COM_CSMCPFORJ_DASHBOARD_METHOD2_STEP2="Copy the prompt below."
COM_CSMCPFORJ_DASHBOARD_METHOD2_STEP3="Replace <code>&lt;PASTE YOUR JOOMLA API TOKEN HERE&gt;</code> with your actual token."
COM_CSMCPFORJ_DASHBOARD_METHOD2_STEP4="Paste it into a new Claude conversation. Claude will discover the available tools and confirm the connection on its first reply."
COM_CSMCPFORJ_DASHBOARD_METHOD2_HINT="This works in any Claude client that can run shell commands (Claude Code, Claude Desktop with shell tool). It will <em>not</em> work in claude.ai's web UI without the MCP connector setup &mdash; that's what Method 1 is for."

