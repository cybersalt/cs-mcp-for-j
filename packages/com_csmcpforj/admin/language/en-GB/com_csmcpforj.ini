; Permissions card
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_HEADING="Who can use this endpoint?"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_INTRO="Permissions are checked against the Joomla user account that owns the API token. The MCP client (Claude Desktop, Claude Code, claude.ai, curl, anything else) is just a relay &mdash; the same token from any client behaves identically."
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_KEY_FACT_LABEL="Important:"
COM_CSMCPFORJ_DASHBOARD_PERMISSIONS_KEY_FACT_BODY="Whoever generates the token gets the same access through the MCP endpoint that they have anywhere else in the Joomla admin. Only generate tokens for users you would trust to do those actions directly."
