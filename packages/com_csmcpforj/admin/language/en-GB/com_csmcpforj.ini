; Filter UI — matches Joomla's standard searchtools (.js-stools) layout used
; on the Articles, Modules, Users etc. list views. Top bar (search + tools +
; clear) floats right; filter panel below has bare dropdowns whose default
; option is the "- Select Foo -" placeholder (value="") meaning "don't filter
; on this dimension". JSEARCH_FILTER / JSEARCH_FILTER_CLEAR / JSEARCH_FILTER_SUBMIT
; are Joomla core strings — already translated. The "Filter Options" button
; text is defined locally because Joomla 5/6's core string for this varies by
; version and reusing it directly is fragile.
COM_CSMCPFORJ_CATALOG_FILTER_OPTIONS="Filter Options"

