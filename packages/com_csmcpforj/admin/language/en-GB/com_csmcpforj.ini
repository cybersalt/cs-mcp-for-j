; Server-side MCP behavior
COM_CSMCPFORJ_CONFIG_SERVER_FIELDSET_LABEL="MCP server"
COM_CSMCPFORJ_CONFIG_SERVER_FIELDSET_DESC="Server-side controls for the MCP endpoint. Affect what MCP clients see and can call."
COM_CSMCPFORJ_CONFIG_READ_ONLY_LABEL="Read-only mode"
COM_CSMCPFORJ_CONFIG_READ_ONLY_DESC="When YES, the MCP endpoint announces and accepts only tools whose MCP ToolAnnotations declare them read-only (list_*, get_*, check_*, validate_*, fetch_*). Useful when you want an AI client to explore the site without any ability to mutate content. Writes return an error explaining the server is in read-only mode. The setting is a floor: an MCP client can also pass ?read_only=1 on the endpoint URL to narrow further, but cannot UNLOCK writes from a site that has this set to YES."

