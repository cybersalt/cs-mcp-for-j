; Token-substitute UI (Method 1 / prompt tab)
COM_CSMCPFORJ_DASHBOARD_TOKEN_INPUT_LABEL="Optional: paste your token here for one-click setup"
COM_CSMCPFORJ_DASHBOARD_TOKEN_INPUT_TOGGLE_SHOW="Show / hide token"
COM_CSMCPFORJ_DASHBOARD_TOKEN_INPUT_CLEAR="Clear the saved token from this browser"
COM_CSMCPFORJ_DASHBOARD_TOKEN_INPUT_HINT="If you paste your Joomla API token here, the Copy button will substitute it into the prompt automatically &mdash; you can paste straight into Claude with no manual edit. <strong>Your token is remembered in this browser only</strong> (via localStorage) &mdash; the dashboard never sends it back to the server. Use the trash button to forget it; leave blank to copy the prompt with the placeholder still in it."
COM_CSMCPFORJ_DASHBOARD_TOKEN_STATUS_SAVED="Saved in this browser. The trash button clears it."
COM_CSMCPFORJ_DASHBOARD_TOKEN_STATUS_EMPTY="No token saved. Paste one above &mdash; it stays in this browser only."

